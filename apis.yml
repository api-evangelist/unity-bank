apis:
- aid: unity-bank:unity-bank-cdr-product-reference-data-api
  name: Unity Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.unitybank.com.au/about-us/corporate-information/public-apis/
  baseURL: https://ibank.gcmutualbank.com.au/openbanking/cds-au/v1
  properties:
  - url: https://www.unitybank.com.au/about-us/corporate-information/public-apis/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: openapi/unity-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference
    Data API exposing Unity Bank's deposit, transaction, and credit card products -
    eligibility, features, pricing, and links to terms and conditions - via GET
    /banking/products and GET /banking/products/{productId}. Conforms to the DSB
    Consumer Data Standards (banking brand code UBL); confirmed live with HTTP 200
    responses negotiating standards versions x-v 4 and 5 across 74 published products.
- aid: unity-bank:unity-bank-cdr-accounts-balances-api
  name: Unity Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.unitybank.com.au/about-us/corporate-information/public-apis/
  baseURL: https://ibank.gcmutualbank.com.au/openbanking/cds-au/v1/banking/accounts
  properties:
  - url: https://www.unitybank.com.au/about-us/corporate-information/public-apis/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-accounts
    type: APIReference
  - url: openapi/unity-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Accounts and Balances
    surface Unity Bank is required to implement as a CDR data holder, covering Get
    Accounts, Get Bulk Balances, Get Account Balance, and Get Account Detail
    (GET /banking/accounts, /banking/accounts/balances, /banking/accounts/{accountId}/balance,
    /banking/accounts/{accountId}). These endpoints are NOT public - they are called
    only by CDR Accredited Data Recipients (ADRs) over MTLS after member consent and
    OAuth2/FAPI authorization, so no unauthenticated probe returns data. The wired
    OpenAPI is the shared DSB Consumer Data Standards CDR Banking API (v1.36.0), not
    a bank-proprietary contract.
