name: Unity Bank
kind: company
description: Unity Bank Limited (ABN 72 087 650 637, AFSL & Australian Credit Licence
  238311, BSB 659 000) is an Australian member-owned mutual bank that consolidated
  the Unity Bank and Reliance Bank brands under a single Unity Bank identity. As an
  authorised deposit-taking institution (ADI) it offers transaction and savings accounts,
  term deposits, home loans, personal loans, credit cards, business banking, and
  wealth services to its members across Australia. Under the Australian Consumer Data
  Right (CDR / open banking), Unity Bank exposes a public, unauthenticated Product
  Reference Data (PRD) API conforming to the DSB Consumer Data Standards, served on
  a shared CDR platform (ibank.gcmutualbank.com.au) and documented on the bank's
  public APIs page. Broader consumer data sharing follows the CDR Accredited Data
  Recipient (ADR) model and is out of scope of the public PRD surface.
